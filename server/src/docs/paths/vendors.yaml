/vendors:
  get:
    tags: [Vendors]
    summary: List vendors
    parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 20, maximum: 100 }
      - in: query
        name: status
        schema: { type: string, enum: [active, inactive, pending] }
      - in: query
        name: isVerified
        schema: { type: boolean }
      - in: query
        name: q
        schema: { type: string }
        description: Search name / description / shortDescription
    responses:
      "200":
        description: Paginated vendors
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PaginationMeta"
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: "#/components/schemas/Vendor"
  post:
    tags: [Vendors]
    summary: Create vendor
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Vendor"
    responses:
      "201":
        description: Created
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:
                  $ref: "#/components/schemas/Vendor"
      "400":
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"

/vendors/search/filters:
  get:
    tags: [Vendors]
    summary: Search vendors with filters
    parameters:
      - in: query
        name: q
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 20 }
      - in: query
        name: status
        schema: { type: string }
      - in: query
        name: isVerified
        schema: { type: boolean }
      - in: query
        name: category
        schema:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
    responses:
      "200":
        description: Filtered vendors

/vendors/{slug}:
  parameters:
    - in: path
      name: slug
      required: true
      schema: { type: string }
  get:
    tags: [Vendors]
    summary: Get vendor by slug
    responses:
      "200":
        description: Vendor
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:
                  $ref: "#/components/schemas/Vendor"
      "404":
        description: Not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
  put:
    tags: [Vendors]
    summary: Update vendor by slug
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Vendor"
    responses:
      "200":
        description: Updated
      "404":
        description: Not found
  delete:
    tags: [Vendors]
    summary: Delete vendor by slug
    responses:
      "200":
        description: Deleted
      "404":
        description: Not found
