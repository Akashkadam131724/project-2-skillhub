/products:
  get:
    tags: [Products]
    summary: List products
    parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 20, maximum: 100 }
      - in: query
        name: status
        schema: { type: string, enum: [active, inactive, draft] }
      - in: query
        name: vendor
        schema: { type: string }
        description: Vendor ObjectId
      - in: query
        name: category
        schema: { type: string }
      - in: query
        name: q
        schema: { type: string }
    responses:
      "200":
        description: Paginated products
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PaginationMeta"
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: "#/components/schemas/Product"
  post:
    tags: [Products]
    summary: Create product
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Product"
    responses:
      "201":
        description: Created
      "400":
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "404":
        description: Vendor not found

/products/vendor/{vendorId}:
  get:
    tags: [Products]
    summary: List products by vendor id
    parameters:
      - in: path
        name: vendorId
        required: true
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 20 }
      - in: query
        name: status
        schema: { type: string }
    responses:
      "200":
        description: Products for vendor
      "404":
        description: Vendor not found

/products/{slug}:
  parameters:
    - in: path
      name: slug
      required: true
      schema: { type: string }
  get:
    tags: [Products]
    summary: Get product by slug
    responses:
      "200":
        description: Product (vendor populated)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean }
                data:
                  $ref: "#/components/schemas/Product"
      "404":
        description: Not found
  put:
    tags: [Products]
    summary: Update product by slug
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Product"
    responses:
      "200":
        description: Updated
      "404":
        description: Not found
  delete:
    tags: [Products]
    summary: Delete product by slug
    responses:
      "200":
        description: Deleted
      "404":
        description: Not found
