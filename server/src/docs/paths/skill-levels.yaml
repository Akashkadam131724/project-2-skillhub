/skill-levels:
  get:
    tags: [Skill Levels]
    summary: List skill levels
    parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 50 }
      - in: query
        name: status
        schema: { type: string, enum: [active, inactive] }
      - in: query
        name: q
        schema: { type: string }
    responses:
      "200":
        description: Paginated skill levels
  post:
    tags: [Skill Levels]
    summary: Create skill level
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SkillLevel"
    responses:
      "201":
        description: Created
      "400":
        description: Validation failed

/skill-levels/{idOrSlug}/courses:
  get:
    tags: [Skill Levels]
    summary: List courses for a skill level
    parameters:
      - in: path
        name: idOrSlug
        required: true
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer }
      - in: query
        name: limit
        schema: { type: integer }
    responses:
      "200":
        description: Courses
      "404":
        description: Skill level not found

/skill-levels/{slug}:
  parameters:
    - in: path
      name: slug
      required: true
      schema: { type: string }
  get:
    tags: [Skill Levels]
    summary: Get skill level by slug
    responses:
      "200":
        description: Skill level
      "404":
        description: Not found
  put:
    tags: [Skill Levels]
    summary: Update skill level by slug
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SkillLevel"
    responses:
      "200":
        description: Updated
      "404":
        description: Not found
  delete:
    tags: [Skill Levels]
    summary: Delete skill level by slug
    responses:
      "200":
        description: Deleted
      "404":
        description: Not found
