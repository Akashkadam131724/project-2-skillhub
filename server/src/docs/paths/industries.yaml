/industries:
  get:
    tags: [Industries]
    summary: List industries
    parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 50 }
      - in: query
        name: status
        schema: { type: string, enum: [active, inactive] }
      - in: query
        name: q
        schema: { type: string }
    responses:
      "200":
        description: Paginated industries
  post:
    tags: [Industries]
    summary: Create industry
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Industry"
    responses:
      "201":
        description: Created
      "400":
        description: Validation failed

/industries/map/course/{courseId}:
  put:
    tags: [Industries]
    summary: Map industries onto a course
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              industries:
                type: array
                items: { type: string }
    responses:
      "200":
        description: Course updated
      "404":
        description: Course not found

/industries/{idOrSlug}/courses:
  get:
    tags: [Industries]
    summary: List courses for an industry
    parameters:
      - in: path
        name: idOrSlug
        required: true
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer }
      - in: query
        name: limit
        schema: { type: integer }
    responses:
      "200":
        description: Courses
      "404":
        description: Industry not found

/industries/{slug}:
  parameters:
    - in: path
      name: slug
      required: true
      schema: { type: string }
  get:
    tags: [Industries]
    summary: Get industry by slug
    responses:
      "200":
        description: Industry
      "404":
        description: Not found
  put:
    tags: [Industries]
    summary: Update industry by slug
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Industry"
    responses:
      "200":
        description: Updated
      "404":
        description: Not found
  delete:
    tags: [Industries]
    summary: Delete industry by slug
    responses:
      "200":
        description: Deleted
      "404":
        description: Not found
