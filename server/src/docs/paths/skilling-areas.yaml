/skilling-areas:
  get:
    tags: [Skilling Areas]
    summary: List skilling areas
    parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 50 }
      - in: query
        name: status
        schema: { type: string, enum: [active, inactive] }
      - in: query
        name: q
        schema: { type: string }
    responses:
      "200":
        description: Paginated skilling areas
  post:
    tags: [Skilling Areas]
    summary: Create skilling area
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SkillingArea"
    responses:
      "201":
        description: Created
      "400":
        description: Validation failed

/skilling-areas/map/course/{courseId}:
  put:
    tags: [Skilling Areas]
    summary: Map skilling areas onto a course
    parameters:
      - in: path
        name: courseId
        required: true
        schema: { type: string }
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              skillingAreas:
                type: array
                items: { type: string }
                description: Skilling area ObjectIds
    responses:
      "200":
        description: Course updated
      "404":
        description: Course not found

/skilling-areas/{idOrSlug}/courses:
  get:
    tags: [Skilling Areas]
    summary: List courses for a skilling area
    parameters:
      - in: path
        name: idOrSlug
        required: true
        schema: { type: string }
      - in: query
        name: page
        schema: { type: integer }
      - in: query
        name: limit
        schema: { type: integer }
    responses:
      "200":
        description: Courses
      "404":
        description: Skilling area not found

/skilling-areas/{slug}:
  parameters:
    - in: path
      name: slug
      required: true
      schema: { type: string }
  get:
    tags: [Skilling Areas]
    summary: Get skilling area by slug
    responses:
      "200":
        description: Skilling area
      "404":
        description: Not found
  put:
    tags: [Skilling Areas]
    summary: Update skilling area by slug
    requestBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SkillingArea"
    responses:
      "200":
        description: Updated
      "404":
        description: Not found
  delete:
    tags: [Skilling Areas]
    summary: Delete skilling area by slug
    responses:
      "200":
        description: Deleted
      "404":
        description: Not found
